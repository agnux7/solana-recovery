<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A1A"/>
      <stop offset="100%" style="stop-color:#1A0A2E"/>
    </linearGradient>
    <linearGradient id="solana" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9945FF"/>
      <stop offset="100%" style="stop-color:#14F195"/>
    </linearGradient>
    <linearGradient id="danger" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF4444;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#FF4444;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FF4444;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#9945FF" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Danger zone (left) -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#danger)" opacity="0.5"/>

  <!-- Left side: compromised wallet -->
  <g transform="translate(200, 315)">
    <!-- Wallet shape -->
    <rect x="-70" y="-50" width="140" height="100" rx="12" fill="#1A0A0A" stroke="#FF4444" stroke-width="2" filter="url(#glow)"/>
    <rect x="-55" y="-35" width="110" height="70" rx="8" fill="#2A0A0A" stroke="#FF4444" stroke-width="1" opacity="0.6"/>
    <!-- Lock icon -->
    <rect x="-15" y="-10" width="30" height="22" rx="4" fill="#FF4444" opacity="0.9"/>
    <path d="M -8 -10 L -8 -18 Q 0 -26 8 -18 L 8 -10" fill="none" stroke="#FF4444" stroke-width="3"/>
    <circle cx="0" cy="1" r="4" fill="#1A0A0A"/>
    <!-- Label -->
    <text y="72" text-anchor="middle" font-family="monospace" font-size="13" fill="#FF6666">COMPROMISED</text>
    <text y="88" text-anchor="middle" font-family="monospace" font-size="11" fill="#FF4444" opacity="0.7">wallet</text>
  </g>

  <!-- Sweeper bot (center-left) -->
  <g transform="translate(500, 180)">
    <rect x="-80" y="-45" width="160" height="90" rx="10" fill="#1A0A0A" stroke="#FF8800" stroke-width="2" opacity="0.9"/>
    <text y="-12" text-anchor="middle" font-family="monospace" font-size="22">🤖</text>
    <text y="12" text-anchor="middle" font-family="monospace" font-size="13" fill="#FF8800">SWEEPER BOT</text>
    <text y="28" text-anchor="middle" font-family="monospace" font-size="10" fill="#FF8800" opacity="0.7">drains SOL in &lt;1s</text>
  </g>

  <!-- SOL drain arrow (up) -->
  <g>
    <path d="M 270 290 Q 380 220 420 200" stroke="#FF4444" stroke-width="2.5" fill="none" stroke-dasharray="8,4" opacity="0.8"/>
    <polygon points="420,190 415,207 430,204" fill="#FF4444" opacity="0.8"/>
    <text x="310" y="240" font-family="monospace" font-size="11" fill="#FF6666" opacity="0.9">SOL stolen</text>
  </g>

  <!-- Right side glow area -->
  <ellipse cx="950" cy="315" rx="200" ry="150" fill="#14F195" opacity="0.04" filter="url(#softglow)"/>

  <!-- Right side: new wallet -->
  <g transform="translate(950, 315)">
    <rect x="-70" y="-50" width="140" height="100" rx="12" fill="#0A1A0A" stroke="#14F195" stroke-width="2" filter="url(#glow)"/>
    <rect x="-55" y="-35" width="110" height="70" rx="8" fill="#0A2A0A" stroke="#14F195" stroke-width="1" opacity="0.6"/>
    <!-- Check icon -->
    <circle cx="0" cy="-4" r="18" fill="#14F195" opacity="0.2"/>
    <path d="M -10 -4 L -3 4 L 12 -12" stroke="#14F195" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text y="72" text-anchor="middle" font-family="monospace" font-size="13" fill="#14F195">DESTINATION</text>
    <text y="88" text-anchor="middle" font-family="monospace" font-size="11" fill="#14F195" opacity="0.7">safe wallet</text>
  </g>

  <!-- Funder wallet (bottom center) -->
  <g transform="translate(580, 490)">
    <rect x="-75" y="-42" width="150" height="84" rx="10" fill="#0A0A1A" stroke="#9945FF" stroke-width="2"/>
    <text y="-10" text-anchor="middle" font-family="monospace" font-size="20">💜</text>
    <text y="12" text-anchor="middle" font-family="monospace" font-size="13" fill="#9945FF">FUNDER</text>
    <text y="28" text-anchor="middle" font-family="monospace" font-size="10" fill="#9945FF" opacity="0.7">pays all fees</text>
  </g>

  <!-- Token transfer arrow (main) -->
  <g filter="url(#glow)">
    <path d="M 280 305 Q 580 260 870 305" stroke="url(#solana)" stroke-width="3" fill="none"/>
    <polygon points="875,305 858,296 858,314" fill="#14F195"/>
  </g>
  <!-- Token dots on arrow -->
  <circle cx="430" cy="280" r="5" fill="#9945FF" opacity="0.9" filter="url(#glow)"/>
  <circle cx="530" cy="270" r="5" fill="#BC53FF" opacity="0.9" filter="url(#glow)"/>
  <circle cx="630" cy="268" r="5" fill="#D680FF" opacity="0.9" filter="url(#glow)"/>
  <circle cx="730" cy="273" r="5" fill="#14F195" opacity="0.9" filter="url(#glow)"/>
  <text x="540" y="255" text-anchor="middle" font-family="monospace" font-size="12" fill="#D680FF" opacity="0.9">103 tokens →</text>

  <!-- Funder fee arrows -->
  <path d="M 530 455 Q 300 420 260 360" stroke="#9945FF" stroke-width="1.5" fill="none" stroke-dasharray="6,3" opacity="0.6"/>
  <polygon points="258,360 265,376 278,368" fill="#9945FF" opacity="0.6"/>
  <path d="M 640 455 Q 880 420 900 360" stroke="#9945FF" stroke-width="1.5" fill="none" stroke-dasharray="6,3" opacity="0.6"/>
  <polygon points="902,360 895,376 882,368" fill="#9945FF" opacity="0.6"/>
  <text x="355" y="412" font-family="monospace" font-size="10" fill="#9945FF" opacity="0.7">fee</text>
  <text x="820" y="412" font-family="monospace" font-size="10" fill="#9945FF" opacity="0.7">fee</text>

  <!-- Main title -->
  <text x="600" y="68" text-anchor="middle" font-family="monospace" font-size="36" font-weight="bold" fill="url(#solana)" filter="url(#glow)">SOLANA WALLET RECOVERY</text>
  <text x="600" y="100" text-anchor="middle" font-family="monospace" font-size="16" fill="#FFFFFF" opacity="0.5">defeating the sweeper bot with the funder-pays-fees pattern</text>

  <!-- Bottom stats -->
  <g transform="translate(0, 570)">
    <rect x="150" y="-22" width="180" height="36" rx="6" fill="#0A1A0A" stroke="#14F195" stroke-width="1" opacity="0.8"/>
    <text x="240" y="-4" text-anchor="middle" font-family="monospace" font-size="12" fill="#14F195">✓ 103/103 tokens</text>
    <text x="240" y="10" text-anchor="middle" font-family="monospace" font-size="10" fill="#14F195" opacity="0.6">recovered</text>

    <rect x="510" y="-22" width="180" height="36" rx="6" fill="#0A0A1A" stroke="#9945FF" stroke-width="1" opacity="0.8"/>
    <text x="600" y="-4" text-anchor="middle" font-family="monospace" font-size="12" fill="#9945FF">~0.40 SOL spent</text>
    <text x="600" y="10" text-anchor="middle" font-family="monospace" font-size="10" fill="#9945FF" opacity="0.6">fees + ATAs</text>

    <rect x="870" y="-22" width="180" height="36" rx="6" fill="#1A0A0A" stroke="#FF8800" stroke-width="1" opacity="0.8"/>
    <text x="960" y="-4" text-anchor="middle" font-family="monospace" font-size="12" fill="#FF8800">0 SOL to sweeper</text>
    <text x="960" y="10" text-anchor="middle" font-family="monospace" font-size="10" fill="#FF8800" opacity="0.6">bot got nothing</text>
  </g>
</svg>
