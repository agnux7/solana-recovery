<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060610"/>
      <stop offset="100%" style="stop-color:#08080E"/>
    </linearGradient>
    <linearGradient id="sol" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9945FF"/>
      <stop offset="100%" style="stop-color:#14F195"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF1744;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#FF1744;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14F195;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#14F195;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="numglow">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="bounds"><rect width="1200" height="480"/></clipPath>
  </defs>

  <g clip-path="url(#bounds)">
    <rect width="1200" height="480" fill="url(#bg)"/>

    <!-- Side color washes -->
    <rect x="0" y="0" width="500" height="480" fill="url(#redGlow)"/>
    <rect x="700" y="0" width="500" height="480" fill="url(#greenGlow)"/>

    <!-- Ambient blobs -->
    <circle cx="160" cy="240" r="220" fill="#FF1744" opacity="0.07" filter="url(#softglow)"/>
    <circle cx="1040" cy="240" r="220" fill="#14F195" opacity="0.07" filter="url(#softglow)"/>

    <!-- Top/bottom accent bars -->
    <rect x="0" y="0" width="1200" height="3" fill="url(#sol)"/>
    <rect x="0" y="477" width="1200" height="3" fill="url(#sol)"/>

    <!-- ── LEFT: broken wallet ── -->
    <g transform="translate(175, 210)" filter="url(#glow)">
      <!-- Wallet body -->
      <rect x="-70" y="-52" width="140" height="104" rx="16" fill="#180409" stroke="#FF1744" stroke-width="3"/>
      <!-- Crack lines -->
      <path d="M 0 -52 L -8 -20 L 10 0 L -4 52" stroke="#FF1744" stroke-width="2" fill="none" opacity="0.7"/>
      <!-- Lock broken -->
      <path d="M -14 -8 L -14 -22 Q 0 -36 14 -22" stroke="#FF1744" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
      <path d="M -14 -8 L -14 -16 Q -4 -20 0 -16" stroke="#FF1744" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
      <rect x="-16" y="-8" width="32" height="24" rx="4" fill="#FF1744" opacity="0.8"/>
      <circle cx="0" cy="4" r="5" fill="#180409"/>
    </g>
    <!-- Skull -->
    <text x="175" y="310" text-anchor="middle" font-size="38">💀</text>

    <!-- ── RIGHT: clean wallet ── -->
    <g transform="translate(1025, 210)" filter="url(#glow)">
      <rect x="-70" y="-52" width="140" height="104" rx="16" fill="#041809" stroke="#14F195" stroke-width="3"/>
      <circle cx="0" cy="-8" r="26" fill="#14F195" opacity="0.12"/>
      <path d="M -14 -8 L -4 6 L 18 -18" stroke="#14F195" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Check -->
    <text x="1025" y="310" text-anchor="middle" font-size="38">✅</text>

    <!-- ── CENTER: big number ── -->
    <text x="600" y="230" text-anchor="middle"
          font-family="'Arial Black', Arial, sans-serif"
          font-size="180" font-weight="900"
          fill="url(#sol)" opacity="0.12"
          letter-spacing="-6">103</text>

    <text x="600" y="228" text-anchor="middle"
          font-family="'Arial Black', Arial, sans-serif"
          font-size="180" font-weight="900"
          fill="url(#sol)"
          filter="url(#numglow)"
          letter-spacing="-6">103</text>

    <!-- Tokens label under number -->
    <text x="600" y="272" text-anchor="middle"
          font-family="monospace" font-size="18"
          fill="#FFFFFF" opacity="0.45"
          letter-spacing="10">TOKENS</text>

    <!-- Arrow left side -->
    <line x1="290" y1="215" x2="460" y2="215" stroke="#FF1744" stroke-width="2" opacity="0.4" stroke-dasharray="6,4"/>

    <!-- Arrow right side -->
    <line x1="740" y1="215" x2="910" y2="215" stroke="#14F195" stroke-width="2" opacity="0.4" stroke-dasharray="6,4"/>
    <polygon points="912,215 898,208 898,222" fill="#14F195" opacity="0.5"/>

    <!-- ── BOTTOM HEADLINE ── -->
    <text x="600" y="390"
          text-anchor="middle"
          font-family="'Arial Black', Arial, sans-serif"
          font-size="44" font-weight="900"
          fill="#FFFFFF">
      My wallet got drained.
    </text>
    <text x="600" y="442"
          text-anchor="middle"
          font-family="'Arial Black', Arial, sans-serif"
          font-size="44" font-weight="900"
          fill="url(#sol)" filter="url(#glow)">
      I still got everything back.
    </text>
  </g>
</svg>
